<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script></head>
<body><div class="card">
<div class="overline">Chart · PFE vs EPE</div>
<div id="ch" style="border:1px solid #e2e8f0;border-radius:10px;overflow:hidden;height:220px;"></div>
<script>
  const weeks = Array.from({length:53}, (_,i)=>i);
  // Smooth PFE that peaks around week 40, then decays to near-0 at week 52
  const pfe = weeks.map(w => {
    const peak = 3.9 * Math.exp(-Math.pow((w-40)/18, 2));
    const decay = w < 48 ? 1 : Math.max(0, (52-w)/4);
    return peak * decay;
  });
  const epe = weeks.map(w => 1.05 * Math.exp(-Math.pow((w-40)/22, 2)) * (w<48?1:Math.max(0,(52-w)/4)));
  const layout = {
    paper_bgcolor:'#ffffff', plot_bgcolor:'#ffffff',
    font:{family:'Inter,sans-serif', color:'#64748b', size:11},
    xaxis:{title:'Time (weeks)', gridcolor:'#f1f5f9', linecolor:'#e2e8f0', zerolinecolor:'#e2e8f0',
           tickfont:{size:10,color:'#94a3b8'}, title_font:{size:11,color:'#64748b'}},
    yaxis:{title:'Exposure (M)', gridcolor:'#f1f5f9', linecolor:'#e2e8f0', zerolinecolor:'#e2e8f0',
           tickfont:{size:10,color:'#94a3b8'}, title_font:{size:11,color:'#64748b'}},
    margin:{l:45,r:15,t:20,b:40},
    hovermode:'x unified',
    legend:{orientation:'h', yanchor:'bottom', y:1.02, xanchor:'right', x:1,
            bgcolor:'rgba(255,255,255,0)', bordercolor:'rgba(0,0,0,0)',
            font:{size:10,color:'#475569'}},
  };
  Plotly.newPlot('ch', [
    {x:weeks, y:pfe, mode:'lines', name:'PFE 95%',
     line:{color:'#ef4444', width:2.5}, fill:'tozeroy', fillcolor:'rgba(239,68,68,0.10)'},
    {x:weeks, y:epe, mode:'lines', name:'EPE',
     line:{color:'#3b82f6', width:2}},
  ], layout, {displayModeBar:false, responsive:true});
</script>
</div></body></html>
