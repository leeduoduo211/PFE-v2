<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body><div class="card">
<div class="overline">Semantic palette</div>
<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:12px;">
  <div>
    <div style="height:44px;background:#3b82f6;border-radius:8px;"></div>
    <div style="height:20px;background:rgba(59,130,246,0.10);border-radius:4px;margin-top:4px;"></div>
    <div style="margin-top:8px;font-weight:600;font-size:12px;color:#1e293b;">Blue</div>
    <div class="mono" style="font-size:10px;color:#64748b;">#3b82f6</div>
    <div style="font-size:10px;color:#94a3b8;">action · EPE · run A</div>
  </div>
  <div>
    <div style="height:44px;background:#ef4444;border-radius:8px;"></div>
    <div style="height:20px;background:rgba(239,68,68,0.12);border-radius:4px;margin-top:4px;"></div>
    <div style="margin-top:8px;font-weight:600;font-size:12px;color:#1e293b;">Red</div>
    <div class="mono" style="font-size:10px;color:#64748b;">#ef4444</div>
    <div style="font-size:10px;color:#94a3b8;">PFE · short · warn</div>
  </div>
  <div>
    <div style="height:44px;background:#22c55e;border-radius:8px;"></div>
    <div style="height:20px;background:rgba(34,197,94,0.10);border-radius:4px;margin-top:4px;"></div>
    <div style="margin-top:8px;font-weight:600;font-size:12px;color:#1e293b;">Green</div>
    <div class="mono" style="font-size:10px;color:#64748b;">#22c55e</div>
    <div style="font-size:10px;color:#94a3b8;">long · gain · +MtM</div>
  </div>
  <div>
    <div style="height:44px;background:#f59e0b;border-radius:8px;"></div>
    <div style="height:20px;background:rgba(245,158,11,0.10);border-radius:4px;margin-top:4px;"></div>
    <div style="margin-top:8px;font-weight:600;font-size:12px;color:#1e293b;">Amber</div>
    <div class="mono" style="font-size:10px;color:#64748b;">#f59e0b</div>
    <div style="font-size:10px;color:#94a3b8;">median · peak time</div>
  </div>
  <div>
    <div style="height:44px;background:#8b5cf6;border-radius:8px;"></div>
    <div style="height:20px;background:rgba(139,92,246,0.10);border-radius:4px;margin-top:4px;"></div>
    <div style="margin-top:8px;font-weight:600;font-size:12px;color:#1e293b;">Purple</div>
    <div class="mono" style="font-size:10px;color:#64748b;">#8b5cf6</div>
    <div style="font-size:10px;color:#94a3b8;">run B (compare)</div>
  </div>
</div>
<div style="margin-top:14px;font-size:11px;color:#64748b;">Every data color is semantic. PFE is red; EPE is blue; median is amber. Don't reassign.</div>
</div></body></html>
