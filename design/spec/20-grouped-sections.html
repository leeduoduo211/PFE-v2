<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body><div class="card">
<div class="overline">Left-stripe grouped sections (trade builder)</div>

<div style="border-left:3px solid #2563eb;padding-left:12px;margin-bottom:6px;">
  <div style="font-weight:600;color:#1e293b;font-size:13px;">Strike &amp; payoff</div>
</div>
<div style="font-size:12px;color:#64748b;margin-bottom:14px;">Core economic terms.</div>

<div style="border-left:3px solid #d97706;padding-left:12px;margin-bottom:6px;">
  <div style="font-weight:600;color:#1e293b;font-size:13px;">
    Modifier: Knock-Out
    <span style="background:#fef3c7;color:#d97706;padding:1px 6px;border-radius:3px;font-size:9px;font-weight:600;margin-left:6px;">BARRIER</span>
  </div>
</div>
<div style="font-size:12px;color:#64748b;margin-bottom:14px;">Kills the trade when spot crosses the barrier.</div>

<div style="border-left:3px solid #16a34a;padding-left:12px;margin-bottom:6px;">
  <div style="font-weight:600;color:#1e293b;font-size:13px;">
    Modifier: Payoff Cap
    <span style="background:#dcfce7;color:#16a34a;padding:1px 6px;border-radius:3px;font-size:9px;font-weight:600;margin-left:6px;">PAYOFF</span>
  </div>
</div>
<div style="font-size:12px;color:#64748b;">Caps the maximum payout at the given level.</div>
</div></body></html>
