<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body><div class="card">
<div class="overline">Text ramp</div>
<div style="display:grid;grid-template-columns:auto 1fr auto;gap:14px 16px;align-items:baseline;">
  <div style="width:18px;height:18px;background:#1e293b;border-radius:4px;"></div>
  <div style="font-size:18px;font-weight:600;color:#1e293b;">Primary — headings, metric value, KPI number</div>
  <div class="mono" style="font-size:11px;color:#64748b;">fg1 · #1e293b</div>

  <div style="width:18px;height:18px;background:#475569;border-radius:4px;"></div>
  <div style="font-size:14px;color:#475569;">Body — read-only value, secondary button label</div>
  <div class="mono" style="font-size:11px;color:#64748b;">fg2 · #475569</div>

  <div style="width:18px;height:18px;background:#64748b;border-radius:4px;"></div>
  <div style="font-size:13px;color:#64748b;">Secondary — subtitle, caption, icon stroke</div>
  <div class="mono" style="font-size:11px;color:#64748b;">fg3 · #64748b</div>

  <div style="width:18px;height:18px;background:#94a3b8;border-radius:4px;"></div>
  <div style="font-size:12px;color:#94a3b8;">Muted — overline, disabled, empty state</div>
  <div class="mono" style="font-size:11px;color:#64748b;">fg4 · #94a3b8</div>
</div>
</div></body></html>
