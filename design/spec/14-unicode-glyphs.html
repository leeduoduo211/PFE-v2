<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body><div class="card">
<div class="overline">Unicode glyphs as state markers</div>
<table style="width:100%;border-collapse:collapse;font-size:13px;">
  <tr style="border-bottom:1px solid #f1f5f9;">
    <td style="padding:8px 10px;width:40px;font-size:20px;color:#3b82f6;">●</td>
    <td class="mono" style="padding:8px 10px;color:#64748b;width:80px;">U+25CF</td>
    <td style="padding:8px 10px;color:#1e293b;">Complete step · active run · selected</td>
  </tr>
  <tr style="border-bottom:1px solid #f1f5f9;">
    <td style="padding:8px 10px;font-size:20px;color:#94a3b8;">○</td>
    <td class="mono" style="padding:8px 10px;color:#64748b;">U+25CB</td>
    <td style="padding:8px 10px;color:#1e293b;">Pending step · empty state</td>
  </tr>
  <tr style="border-bottom:1px solid #f1f5f9;">
    <td style="padding:8px 10px;font-size:20px;color:#3b82f6;">▸</td>
    <td class="mono" style="padding:8px 10px;color:#64748b;">U+25B8</td>
    <td style="padding:8px 10px;color:#1e293b;">Next step · workflow pointer</td>
  </tr>
  <tr style="border-bottom:1px solid #f1f5f9;">
    <td style="padding:8px 10px;font-size:20px;color:#64748b;">→</td>
    <td class="mono" style="padding:8px 10px;color:#64748b;">U+2192</td>
    <td style="padding:8px 10px;color:#1e293b;">Modifier chain: <span class="mono" style="color:#334155;">KnockOut → VanillaOption</span></td>
  </tr>
  <tr>
    <td style="padding:8px 10px;font-size:20px;color:#3b82f6;">◈</td>
    <td class="mono" style="padding:8px 10px;color:#64748b;">U+25C8</td>
    <td style="padding:8px 10px;color:#1e293b;">Page icon / favicon</td>
  </tr>
</table>
</div></body></html>
