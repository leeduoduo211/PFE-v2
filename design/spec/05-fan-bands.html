<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body><div class="card">
<div class="overline">Fan-chart percentile bands</div>
<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px;">
  <div>
    <div style="height:56px;background:rgba(239,68,68,0.05);border-radius:6px;"></div>
    <div style="margin-top:8px;font-weight:600;font-size:12px;color:#1e293b;">5–95%</div>
    <div class="mono" style="font-size:10px;color:#64748b;">rgba(239,68,68,.05)</div>
  </div>
  <div>
    <div style="height:56px;background:rgba(239,68,68,0.12);border-radius:6px;"></div>
    <div style="margin-top:8px;font-weight:600;font-size:12px;color:#1e293b;">25–75%</div>
    <div class="mono" style="font-size:10px;color:#64748b;">rgba(239,68,68,.12)</div>
  </div>
  <div>
    <div style="height:56px;background:rgba(239,68,68,0.22);border-radius:6px;"></div>
    <div style="margin-top:8px;font-weight:600;font-size:12px;color:#1e293b;">Inner</div>
    <div class="mono" style="font-size:10px;color:#64748b;">rgba(239,68,68,.22)</div>
  </div>
</div>
<div style="margin-top:12px;font-size:11px;color:#64748b;">Median line overlays at amber <span class="mono">#f59e0b</span>. Stack darkens toward the median.</div>
</div></body></html>
